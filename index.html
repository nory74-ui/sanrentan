<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>価値観一致ゲーム</title>
  
  <!-- React & ReactDOM (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (for JSX compilation in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* iOSでのタップハイライトなどを無効化し、アプリらしい挙動にする */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none;
    }
    input {
      -webkit-user-select: text;
      user-select: text;
    }
    /* カスタムスクロールバー */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Lucide Icons コンポーネントの代わり (CDNから直接利用するためSVGで定義) ---
    const IconUsers = ({ size=24, className="" }) => <i data-lucide="users" width={size} height={size} className={className}></i>;
    const IconPlay = ({ size=24, className="" }) => <i data-lucide="play" width={size} height={size} className={className}></i>;
    const IconChevronRight = ({ size=24, className="" }) => <i data-lucide="chevron-right" width={size} height={size} className={className}></i>;
    const IconTrophy = ({ size=24, className="" }) => <i data-lucide="trophy" width={size} height={size} className={className}></i>;
    const IconEyeOff = ({ size=24, className="" }) => <i data-lucide="eye-off" width={size} height={size} className={className}></i>;
    const IconEye = ({ size=24, className="" }) => <i data-lucide="eye" width={size} height={size} className={className}></i>;
    const IconRotateCcw = ({ size=24, className="" }) => <i data-lucide="rotate-ccw" width={size} height={size} className={className}></i>;
    const IconMessageCircle = ({ size=24, className="" }) => <i data-lucide="message-circle" width={size} height={size} className={className}></i>;
    const IconAlertCircle = ({ size=24, className="" }) => <i data-lucide="alert-circle" width={size} height={size} className={className}></i>;

    // 中学校のコミュニケーション向けお題リスト（全40問）
    const THEMES = [
      // 学校生活・あるある
      { title: "給食でテンションが上がるメニューは？", options: ["カレーライス", "揚げパン", "鶏のからあげ", "冷凍みかん", "フルーツポンチ", "わかめご飯", "ゼリー・プリン"] },
      { title: "テスト期間中、ついやってしまう現実逃避は？", options: ["部屋の片付け", "スマホ・SNSを見る", "漫画を読む", "とりあえず寝る", "急に料理/お菓子作り", "爪を切る", "昔のアルバムを見る"] },
      { title: "学校で一番好きな場所は？", options: ["教室の自分の席", "図書室", "体育館", "グラウンド", "音楽室", "中庭・渡り廊下", "保健室"] },
      { title: "席替えで一番嬉しい席は？", options: ["一番後ろの端っこ", "一番後ろの真ん中", "教卓の目の前", "窓際", "廊下側", "仲良い友達の隣", "ストーブ/エアコンの近く"] },
      { title: "好きな教科（実技系含む）は？", options: ["体育", "音楽", "美術", "技術・家庭", "国語", "数学", "理科・社会"] },
      { title: "体育祭で一番燃える競技は？", options: ["全員リレー", "選抜リレー", "綱引き", "大縄跳び", "玉入れ", "騎馬戦・棒倒し", "応援合戦"] },
      { title: "クラス替えで一番気になることは？", options: ["仲の良い友達と同じになれるか", "担任の先生は誰か", "好きな人と同じクラスか", "面白そうな人がいるか", "部活の友達がいるか", "教室の場所", "ヤバい人がいないか"] },
      { title: "クラスの中で自分が担当したい役割は？", options: ["みんなをまとめるリーダー", "ムードメーカー・お笑い担当", "裏で支えるサポート役", "アイデアを出す企画担当", "冷静なツッコミ役", "癒し系マスコット", "何もせず見守る傍観者"] },
      { title: "一番テンションが上がる行事は？", options: ["修学旅行・遠足", "体育祭", "文化祭・合唱コンクール", "夏休み", "お正月", "自分の誕生日", "クリスマス"] },
      { title: "夏休みの宿題、いつやるタイプ？", options: ["最初の1週間で終わらせる", "毎日コツコツやる", "お盆過ぎから焦り始める", "最後の3日間で徹夜", "親に手伝ってもらう", "答えを丸写しする", "最悪やらない・言い訳する"] },

      // もしも・究極の選択
      { title: "もし一つだけ超能力が使えるなら？", options: ["空を飛ぶ", "瞬間移動", "透明人間", "時間を止める", "動物と話す", "人の心が読める", "未来が見える"] },
      { title: "ドラえもんのひみつ道具、一つもらうなら？", options: ["どこでもドア", "タケコプター", "タイムマシン", "ほんやくコンニャク", "暗記パン", "もしもボックス", "四次元ポケット"] },
      { title: "無人島に一つだけ持っていくなら？", options: ["スマホ・ゲーム機", "サバイバルナイフ", "ライター・マッチ", "テント", "友達", "浄水器", "大量の食料"] },
      { title: "100万円を今日中に使い切るなら？", options: ["ゲーム・漫画を爆買い", "服や靴を買いまくる", "家族で豪華な旅行", "高級なものを食べまくる", "友達に奢りまくる", "推し活に全額使う", "最新のパソコン・スマホ"] },
      { title: "生まれ変わるならどれがいい？", options: ["イケメン・美女", "天才的な頭脳の持ち主", "スポーツ万能な人", "大富豪の子供", "鳥", "猫", "もう一度自分"] },
      { title: "もしYouTuberになるならどんな企画をやる？", options: ["ゲーム実況", "大食い・早食い", "ドッキリ", "歌ってみた・踊ってみた", "商品レビュー・紹介", "勉強・解説系", "ルーティン・日常系"] },
      { title: "タイムトラベルできるならいつに行きたい？", options: ["自分が生まれた日", "恐竜の時代", "江戸時代や戦国時代", "100年後の未来", "10年後の自分を見に行く", "親の子供時代", "昨日に戻ってやり直す"] },
      { title: "もし1日だけ動物になれるなら？", options: ["空を自由に飛べる鳥", "ずっと寝ていられる猫", "飼い主に愛される犬", "海を泳ぐイルカ", "最強のライオン・トラ", "のんびりしたカピバラ", "足が速いチーター"] },

      // 性格・価値観・友達
      { title: "友達に言われて一番嬉しい言葉は？", options: ["面白いね", "優しいね", "おしゃれだね", "頭いいね", "一緒にいると楽しい", "頼りになるね", "センスいいよね"] },
      { title: "友達になりたいのはどんなタイプ？", options: ["とにかく面白い人", "いつも優しい人", "趣味が合う人", "聞き上手な人", "何かに熱中している人", "一緒にいて落ち着く人", "勉強やスポーツを教えてくれる人"] },
      { title: "自分が一番大切にしている時間は？", options: ["寝ている時間", "友達と話している時間", "部活・趣味の時間", "一人で動画やゲームをしている時間", "美味しいものを食べている時間", "家族との時間", "推し活の時間"] },
      { title: "休日の理想の過ごし方は？", options: ["昼まで爆睡", "友達と遊びに行く", "一日中ゲーム・動画", "部活やスポーツで汗を流す", "家族とお出かけ", "ショッピング", "趣味に没頭する"] },
      { title: "自分の性格を一言で表すと？", options: ["マイペース", "負けず嫌い", "お調子者", "心配性", "ポジティブ", "人見知り", "面倒くさがり"] },
      { title: "怒っているとき、どうしてほしい？", options: ["そっとしておいてほしい", "話を聞いてほしい", "笑わせてほしい", "美味しいものを食べさせてほしい", "一緒に怒ってほしい", "謝ってほしい", "気分転換に連れ出してほしい"] },

      // 趣味・エンタメ
      { title: "YouTubeでよく見るジャンルは？", options: ["ゲーム実況", "音楽・MV", "YouTuberの企画系", "アニメ・映画の切り抜き", "勉強・解説", "スポーツのハイライト", "動物・ペット"] },
      { title: "スマホに入っていないと困るアプリは？", options: ["LINE", "YouTube", "TikTok", "Instagram", "ゲームアプリ", "カメラ", "音楽アプリ"] },
      { title: "カラオケでよく歌う・聴きたいジャンルは？", options: ["最新のJ-POP", "アニソン", "ボカロ", "K-POP", "アイドル", "ちょっと昔のヒット曲", "洋楽"] },
      { title: "好きなゲームのジャンルは？", options: ["RPG", "FPS・TPS（撃ち合い）", "パズル・脳トレ", "音楽・リズムゲーム", "スポーツ・レース", "シミュレーション・育成", "格闘・アクション"] },
      { title: "映画を見るならどのジャンル？", options: ["アニメ", "アクション", "コメディ", "ホラー", "恋愛・青春", "SF・ファンタジー", "ミステリー・サスペンス"] },

      // 食べ物・日常
      { title: "コンビニでつい買っちゃうものは？", options: ["ホットスナック(からあげ等)", "新作のアイス", "ポテトチップス・スナック菓子", "グミやチョコ", "菓子パン", "ジュース・炭酸", "おにぎり"] },
      { title: "夏に絶対食べたいものは？", options: ["かき氷", "スイカ", "そうめん", "冷やし中華", "アイスクリーム", "お祭りの焼きそば", "きゅうり"] },
      { title: "冬に絶対食べたいものは？", options: ["おでん", "鍋", "肉まん", "みかん", "シチュー", "焼き芋", "おしるこ"] },
      { title: "お弁当に入っていたらテンションが上がるおかずは？", options: ["からあげ", "卵焼き", "ウインナー・タコさん", "ハンバーグ", "ミートボール", "エビフライ", "ポテトサラダ"] },
      { title: "ファミレスに行ったら頼むものは？", options: ["ハンバーグ", "ポテトフライ", "パスタ", "ピザ", "パフェなどのデザート", "ドリア", "ドリンクバー"] },
      { title: "お菓子の定番、どれが好き？", options: ["ポテトチップス", "チョコレート", "グミ", "クッキー・ビスケット", "おせんべい", "ラムネ", "キャンディ"] },
      { title: "朝起きて一番にすることは？", options: ["スマホの通知確認", "二度寝", "トイレに行く", "顔を洗う", "水を飲む", "伸びをする", "テレビをつける"] },
      { title: "夜、寝る前についやってしまうことは？", options: ["スマホで動画を見る", "SNSをチェックする", "音楽を聴く", "明日持っていくものの準備", "その日あったことを思い出す", "漫画を読む", "軽くストレッチする"] },
      { title: "テンションが下がる瞬間は？", options: ["イヤホンが絡まっている", "スマホの充電が1%", "楽しみにしていたおやつが食べられた", "雨が降ってきた", "宿題を忘れたことに気づいた", "小指をぶつけた", "Wi-Fiが繋がらない"] },
      { title: "バッグの中にいつも入っているものは？", options: ["リップ・ハンドクリーム", "モバイルバッテリー", "イヤホン", "お菓子", "くし・鏡", "ティッシュ・ハンカチ", "お守り"] },
      { title: "得意になりたいスポーツは？", options: ["サッカー", "バスケ", "バレーボール", "野球", "テニス", "陸上(足が速くなる)", "水泳"] }
    ];

    // 役の判定と得点計算
    const calculateScore = (ans, guess) => {
      if (ans[0] === guess[0] && ans[1] === guess[1] && ans[2] === guess[2]) {
        return { score: 6, name: 'ピッタリ！(サンレンタン)', color: 'text-yellow-600 bg-yellow-100 border-yellow-400' };
      }
      
      const ansSet = new Set(ans);
      let matchCount = 0;
      guess.forEach(g => { if (ansSet.has(g)) matchCount++; });

      if (matchCount === 3) {
        return { score: 4, name: '惜しい！順位違い(サンレンプク)', color: 'text-orange-600 bg-orange-100 border-orange-400' };
      }
      if (ans[0] === guess[0] && ans[1] === guess[1]) {
        return { score: 3, name: '1・2位正解！(ニレンタン)', color: 'text-pink-600 bg-pink-100 border-pink-400' };
      }
      if (matchCount === 2) {
        return { score: 2, name: '2つ正解！(プクプク)', color: 'text-blue-600 bg-blue-100 border-blue-400' };
      }
      if (ans[0] === guess[0]) {
        return { score: 1, name: '1位だけ正解！(タン)', color: 'text-green-600 bg-green-100 border-green-400' };
      }
      return { score: 0, name: '残念！ハズレ', color: 'text-gray-500 bg-gray-100 border-gray-300' };
    };

    function App() {
      const [phase, setPhase] = useState('setup'); // setup, dealer_turn, guesser_transition, guesser_turn, pre_result, result, scoreboard, pre_next_round
      const [players, setPlayers] = useState([
        { id: 1, name: '生徒A', score: 0 }, 
        { id: 2, name: '生徒B', score: 0 }, 
        { id: 3, name: '生徒C', score: 0 },
        { id: 4, name: '生徒D', score: 0 }
      ]);
      const [newPlayerName, setNewPlayerName] = useState('');
      
      const [round, setRound] = useState(1);
      const [dealerIndex, setDealerIndex] = useState(0); 
      const [currentTheme, setCurrentTheme] = useState(null);
      
      const [dealerAnswer, setDealerAnswer] = useState([]); 
      const [guesses, setGuesses] = useState({}); 
      const [currentGuesserIndex, setCurrentGuesserIndex] = useState(0); 
      const [usedThemeIndices, setUsedThemeIndices] = useState([]);

      // Lucideアイコンの再描画用
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [phase]);

      // --- セットアップ関連 ---
      const addPlayer = () => {
        if (newPlayerName.trim() && players.length < 8) {
          setPlayers([...players, { id: Date.now(), name: newPlayerName.trim(), score: 0 }]);
          setNewPlayerName('');
        }
      };

      const removePlayer = (id) => {
        if (players.length > 2) {
          setPlayers(players.filter(p => p.id !== id));
        }
      };

      const startGame = () => {
        setRound(1);
        setDealerIndex(0);
        setUsedThemeIndices([]);
        startRound(0, []);
      };

      const startRound = (dealerIdx, usedIndices = usedThemeIndices) => {
        let availableIndices = THEMES.map((_, index) => index).filter(index => !usedIndices.includes(index));
        
        if (availableIndices.length === 0) {
          availableIndices = THEMES.map((_, index) => index);
          usedIndices = [];
        }

        const randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
        const theme = THEMES[randomIndex];
        
        setUsedThemeIndices([...usedIndices, randomIndex]);
        setCurrentTheme(theme);
        setDealerAnswer([]);
        setGuesses({});
        
        let firstGuesser = (dealerIdx + 1) % players.length;
        setCurrentGuesserIndex(firstGuesser);
        
        setPhase('dealer_turn');
      };

      const handleDealerSubmit = (answer) => {
        setDealerAnswer(answer);
        setPhase('guesser_transition');
      };

      const handleGuesserSubmit = (guess) => {
        const guesserId = players[currentGuesserIndex].id;
        setGuesses({ ...guesses, [guesserId]: guess });

        let nextGuesser = (currentGuesserIndex + 1) % players.length;
        
        if (nextGuesser === dealerIndex) {
          setPhase('pre_result');
        } else {
          setCurrentGuesserIndex(nextGuesser);
          setPhase('guesser_transition');
        }
      };

      const processResults = () => {
        const newPlayers = [...players];
        Object.keys(guesses).forEach(guesserIdStr => {
          const guesserId = parseInt(guesserIdStr);
          const guess = guesses[guesserId];
          const result = calculateScore(dealerAnswer, guess);
          const pIndex = newPlayers.findIndex(p => p.id === guesserId);
          if (pIndex !== -1) {
            newPlayers[pIndex].score += result.score;
          }
        });
        setPlayers(newPlayers);
        setPhase('result');
      };

      const prepareNextRound = () => {
        setPhase('pre_next_round');
      };

      const nextRound = () => {
        const nextDealerIdx = (dealerIndex + 1) % players.length;
        setDealerIndex(nextDealerIdx);
        setRound(round + 1);
        startRound(nextDealerIdx);
      };

      // --- 共通の選択UIコンポーネント ---
      const SelectionUI = ({ title, options, onSubmit, roleName, description }) => {
        const [selected, setSelected] = useState([]);

        const toggleOption = (opt) => {
          if (selected.includes(opt)) {
            setSelected(selected.filter(o => o !== opt));
          } else {
            if (selected.length < 3) {
              setSelected([...selected, opt]);
            }
          }
        };

        return (
          <div className="flex flex-col h-full bg-white rounded-3xl shadow-xl overflow-hidden">
            <div className="bg-gradient-to-r from-blue-500 to-indigo-600 p-6 text-center text-white">
              <p className="text-lg font-bold text-blue-100 mb-2 bg-blue-900/30 inline-block px-4 py-1 rounded-full">{roleName}</p>
              <h2 className="text-2xl sm:text-3xl font-black leading-tight mb-2">{title}</h2>
              <p className="text-sm sm:text-base font-medium opacity-90">{description}</p>
            </div>

            <div className="flex-grow p-4 space-y-3 overflow-y-auto bg-slate-50">
              {options.map((opt, idx) => {
                const rankIndex = selected.indexOf(opt);
                const isSelected = rankIndex !== -1;
                
                return (
                  <button
                    key={idx}
                    onClick={() => toggleOption(opt)}
                    className={`w-full text-left p-5 rounded-2xl border-4 font-bold transition-all relative flex items-center ${
                      isSelected 
                        ? 'border-indigo-500 bg-indigo-50 text-indigo-900 shadow-md transform scale-[1.02]' 
                        : 'border-white bg-white text-slate-700 hover:border-indigo-200 shadow-sm'
                    }`}
                  >
                    {isSelected && (
                      <span className="bg-indigo-600 text-white w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center font-black text-xl mr-4 shadow-lg shrink-0">
                        {rankIndex + 1}
                      </span>
                    )}
                    {!isSelected && (
                      <span className="w-10 h-10 sm:w-12 sm:h-12 rounded-full border-4 border-slate-200 mr-4 shrink-0"></span>
                    )}
                    <span className="text-lg sm:text-xl break-words pr-2">{opt}</span>
                  </button>
                );
              })}
            </div>

            <div className="p-4 bg-white border-t-2 border-slate-100">
              <button
                onClick={() => onSubmit(selected)}
                disabled={selected.length !== 3}
                className={`w-full py-5 rounded-2xl font-black text-xl transition-all shadow-lg ${
                  selected.length === 3
                    ? 'bg-indigo-600 hover:bg-indigo-700 text-white active:scale-95'
                    : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                }`}
              >
                {selected.length === 3 ? '決定して画面を隠す' : `あと ${3 - selected.length} つ選択してください`}
              </button>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-200 font-sans flex flex-col items-center justify-center p-2 sm:p-4">
          <div className="w-full max-w-3xl bg-slate-50 flex flex-col h-[95vh] rounded-3xl shadow-2xl overflow-hidden border-4 border-slate-300">
            
            {/* ヘッダー */}
            <header className="bg-slate-800 text-white p-4 sm:p-5 text-center shadow-md z-10 flex justify-between items-center shrink-0">
              <div className="flex items-center gap-2">
                <IconMessageCircle className="text-indigo-400" />
                <h1 className="text-xl sm:text-2xl font-black tracking-widest">
                  価値観一致ゲーム
                </h1>
              </div>
              <span className="text-sm font-bold bg-slate-700 px-3 py-1 rounded-full text-slate-300 hidden sm:inline-block">全40問</span>
            </header>

            <main className="flex-grow p-3 sm:p-6 flex flex-col overflow-hidden">
              
              {/* Setup: プレイヤー登録 */}
              {phase === 'setup' && (
                <div className="bg-white rounded-3xl shadow-xl p-6 sm:p-8 flex flex-col h-full border-4 border-indigo-100">
                  <h2 className="text-2xl sm:text-3xl font-black text-center mb-6 text-slate-800 flex items-center justify-center gap-3">
                    <IconUsers className="text-indigo-500 w-8 h-8" />
                    参加者の名前を登録
                  </h2>
                  
                  <div className="flex gap-3 mb-6">
                    <input 
                      type="text" 
                      value={newPlayerName}
                      onChange={(e) => setNewPlayerName(e.target.value)}
                      placeholder="名前を入力"
                      className="flex-grow border-4 border-slate-200 rounded-2xl px-5 py-4 text-lg sm:text-xl focus:outline-none focus:border-indigo-500 font-bold bg-slate-50"
                      onKeyDown={(e) => e.key === 'Enter' && addPlayer()}
                      maxLength={10}
                    />
                    <button 
                      onClick={addPlayer}
                      disabled={players.length >= 8 || !newPlayerName.trim()}
                      className="bg-indigo-600 text-white px-6 sm:px-8 py-4 rounded-2xl text-xl font-bold disabled:bg-slate-300 shadow-md active:scale-95 transition-transform"
                    >
                      追加
                    </button>
                  </div>

                  <div className="flex-grow overflow-y-auto mb-6 pr-2">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {players.map((p, idx) => (
                        <div key={p.id} className="flex items-center justify-between bg-indigo-50 p-4 rounded-2xl font-bold text-slate-800 border-2 border-indigo-100">
                          <span className="flex items-center gap-3 text-lg sm:text-xl">
                            <span className="bg-indigo-200 text-indigo-800 w-8 h-8 rounded-full flex items-center justify-center text-sm">{idx + 1}</span>
                            {p.name}
                          </span>
                          {players.length > 2 && (
                            <button onClick={() => removePlayer(p.id)} className="text-red-400 hover:text-red-600 p-2 bg-white rounded-full shadow-sm">
                              ✕
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                    {players.length >= 8 && <p className="text-base text-red-500 mt-4 text-center font-bold">最大8人までです</p>}
                  </div>

                  <button
                    onClick={startGame}
                    className="w-full bg-gradient-to-r from-indigo-500 to-blue-600 hover:from-indigo-600 hover:to-blue-700 text-white py-5 rounded-2xl font-black text-2xl shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-transform"
                  >
                    <IconPlay size={28} />
                    ゲームスタート
                  </button>
                </div>
              )}

              {/* 出題者のターン */}
              {phase === 'dealer_turn' && (
                <SelectionUI
                  roleName={`出題者：${players[dealerIndex].name}`}
                  title={currentTheme.title}
                  description="他の人に見られないように、自分なりの1位〜3位を選択してください。"
                  options={currentTheme.options}
                  onSubmit={handleDealerSubmit}
                />
              )}

              {/* 回答者のターンへ移行する間のクッション画面 */}
              {phase === 'guesser_transition' && (
                <div className="bg-white rounded-3xl shadow-xl p-8 flex flex-col items-center justify-center h-full text-center border-8 border-indigo-100">
                  <div className="mb-8 animate-pulse text-indigo-300">
                    <IconEyeOff size={80} />
                  </div>
                  
                  <div className="bg-indigo-50 px-8 py-6 rounded-3xl mb-8 border-2 border-indigo-200 w-full max-w-sm">
                    <p className="text-xl sm:text-2xl font-bold text-slate-600 mb-4">タブレットを</p>
                    <h2 className="text-4xl sm:text-5xl font-black text-indigo-700 mb-4">
                      {players[currentGuesserIndex].name} <span className="text-2xl sm:text-3xl text-slate-600">さん</span>
                    </h2>
                    <p className="text-xl sm:text-2xl font-bold text-slate-600">に渡してください</p>
                  </div>

                  <button
                    onClick={() => setPhase('guesser_turn')}
                    className="w-full max-w-md bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-2xl font-black text-xl sm:text-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-transform"
                  >
                    <IconEye size={28} />
                    予想を開始する
                  </button>
                </div>
              )}

              {/* 回答者のターン */}
              {phase === 'guesser_turn' && (
                <SelectionUI
                  roleName={`予想中：${players[currentGuesserIndex].name} さん`}
                  title={currentTheme.title}
                  description={`${players[dealerIndex].name} さんが選んだと思う1位〜3位を予想してください。`}
                  options={currentTheme.options}
                  onSubmit={handleGuesserSubmit}
                />
              )}

              {/* 結果発表前のクッション画面 */}
              {phase === 'pre_result' && (
                <div className="bg-white rounded-3xl shadow-xl p-8 flex flex-col items-center justify-center h-full text-center border-8 border-yellow-100">
                  <div className="text-yellow-400 mb-8">
                    <IconAlertCircle size={80} />
                  </div>
                  <h2 className="text-3xl sm:text-4xl font-black text-slate-800 mb-6">全員の予想が完了しました</h2>
                  <p className="text-lg sm:text-xl font-bold text-slate-600 mb-10">
                    タブレットをみんなが見える場所に<br/>置いてください。
                  </p>
                  <button
                    onClick={processResults}
                    className="w-full max-w-md bg-yellow-500 hover:bg-yellow-600 text-white py-5 rounded-2xl font-black text-xl sm:text-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-transform"
                  >
                    <IconChevronRight size={28} />
                    結果発表を見る！
                  </button>
                </div>
              )}

              {/* 結果発表 */}
              {phase === 'result' && (
                <div className="flex flex-col h-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-indigo-200">
                  
                  {/* 出題者の答え */}
                  <div className="bg-gradient-to-r from-indigo-700 to-slate-800 text-white p-6 sm:p-8 text-center shadow-lg relative z-10">
                    <p className="text-base sm:text-lg font-bold text-indigo-200 mb-2">{players[dealerIndex].name} さんの正解は…</p>
                    <h2 className="text-xl sm:text-2xl font-black mb-6">{currentTheme.title}</h2>
                    <div className="flex justify-center gap-3 sm:gap-4">
                      {[1, 2, 3].map((rank, idx) => (
                        <div key={rank} className="bg-white text-slate-800 p-3 sm:p-4 rounded-2xl flex-1 shadow-inner border-b-4 border-indigo-300">
                          <div className="text-sm sm:text-base text-indigo-600 font-black mb-1">{rank}位</div>
                          <div className="text-base sm:text-lg font-bold truncate">{dealerAnswer[idx]}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* 各プレイヤーの予想と結果 */}
                  <div className="flex-grow overflow-y-auto p-4 sm:p-6 space-y-4 bg-slate-50">
                    <h3 className="text-lg sm:text-xl font-black text-center text-slate-500 mb-4 flex items-center justify-center gap-2">
                      <IconMessageCircle size={24} /> みんなの予想と結果
                    </h3>
                    
                    {players.filter(p => p.id !== players[dealerIndex].id).map(p => {
                      const guess = guesses[p.id];
                      const result = calculateScore(dealerAnswer, guess);
                      
                      return (
                        <div key={p.id} className={`bg-white rounded-2xl shadow-md border-4 overflow-hidden ${result.color.split(' ')[2]}`}>
                          <div className={`px-4 sm:px-6 py-3 flex justify-between items-center ${result.color.split(' ')[1]}`}>
                            <span className="font-black text-lg sm:text-xl text-slate-800">{p.name}</span>
                            <span className={`font-black text-sm sm:text-base px-3 py-1 rounded-full bg-white shadow-sm ${result.color.split(' ')[0]}`}>
                              {result.name} (+{result.score}pt)
                            </span>
                          </div>
                          <div className="p-3 sm:p-4 flex justify-between gap-2 bg-white">
                            {[1, 2, 3].map((rank, idx) => {
                              const isCorrectRank = guess[idx] === dealerAnswer[idx];
                              const isIncluded = dealerAnswer.includes(guess[idx]);
                              
                              return (
                                <div key={rank} className={`flex-1 text-center p-2 rounded-xl border-2 ${isCorrectRank ? 'bg-green-50 border-green-200 text-green-800' : isIncluded ? 'bg-yellow-50 border-yellow-200 text-yellow-800' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                  <div className="text-xs sm:text-sm font-bold opacity-70 mb-1">{rank}位予想</div>
                                  <div className="text-sm sm:text-base font-bold break-words leading-tight">{guess[idx]}</div>
                                </div>
                              )
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="p-4 sm:p-6 bg-white border-t-2 border-slate-100">
                    <button
                      onClick={() => setPhase('scoreboard')}
                      className="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 sm:py-5 rounded-2xl font-black text-xl sm:text-2xl flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform"
                    >
                      ランキングを確認する <IconChevronRight size={24} />
                    </button>
                  </div>
                </div>
              )}

              {/* スコアボード */}
              {phase === 'scoreboard' && (
                <div className="bg-white rounded-3xl shadow-xl p-6 sm:p-8 flex flex-col h-full border-4 border-yellow-400">
                  <h2 className="text-3xl sm:text-4xl font-black text-center mb-2 text-slate-800 flex items-center justify-center gap-3">
                    <IconTrophy className="text-yellow-500 w-10 h-10" />
                    現在の順位
                  </h2>
                  <p className="text-center text-slate-500 text-base sm:text-lg mb-8 font-bold bg-slate-100 py-2 rounded-full w-max mx-auto px-6">
                    第 {round} ラウンド終了
                  </p>
                  
                  <div className="flex-grow overflow-y-auto space-y-3 sm:space-y-4 px-2">
                    {[...players].sort((a, b) => b.score - a.score).map((p, idx) => (
                      <div key={p.id} className="flex items-center justify-between bg-slate-50 p-4 sm:p-5 rounded-2xl border-2 border-slate-200 shadow-sm">
                        <div className="flex items-center gap-4 sm:gap-6">
                          <span className={`font-black text-2xl sm:text-3xl w-8 text-center ${idx === 0 ? 'text-yellow-500' : idx === 1 ? 'text-slate-400' : idx === 2 ? 'text-amber-600' : 'text-slate-300'}`}>
                            {idx + 1}
                          </span>
                          <span className="font-black text-xl sm:text-2xl text-slate-700">{p.name}</span>
                        </div>
                        <span className="font-black text-3xl sm:text-4xl text-indigo-600">
                          {p.score}<span className="text-lg sm:text-xl text-slate-400 ml-1">pt</span>
                        </span>
                      </div>
                    ))}
                  </div>

                  <div className="pt-8 space-y-4">
                    <button
                      onClick={prepareNextRound}
                      className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-2xl font-black text-xl sm:text-2xl shadow-xl active:scale-95 transition-transform"
                    >
                      次のラウンドへ（ラウンド {round + 1}）
                    </button>
                    <button
                      onClick={() => setPhase('setup')}
                      className="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 py-4 rounded-2xl font-bold text-base sm:text-lg flex items-center justify-center gap-2"
                    >
                      <IconRotateCcw size={20} /> 最初からやり直す
                    </button>
                  </div>
                </div>
              )}

              {/* 次のラウンド準備前のクッション画面 */}
              {phase === 'pre_next_round' && (
                <div className="bg-white rounded-3xl shadow-xl p-8 flex flex-col items-center justify-center h-full text-center border-8 border-indigo-100">
                  <h2 className="text-3xl sm:text-4xl font-black text-slate-800 mb-8">第 {round + 1} ラウンド</h2>
                  <div className="bg-indigo-50 px-8 py-6 rounded-3xl mb-8 border-2 border-indigo-200 w-full max-w-sm">
                    <p className="text-xl sm:text-2xl font-bold text-slate-600 mb-4">次の出題者は</p>
                    <h2 className="text-4xl sm:text-5xl font-black text-indigo-700 mb-4">
                      {players[(dealerIndex + 1) % players.length].name} <span className="text-2xl sm:text-3xl text-slate-600">さん</span>
                    </h2>
                    <p className="text-xl sm:text-2xl font-bold text-slate-600">です！</p>
                  </div>
                  <p className="text-lg sm:text-xl font-bold text-slate-500 mb-8">
                    タブレットを渡してください。
                  </p>
                  <button
                    onClick={nextRound}
                    className="w-full max-w-md bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-2xl font-black text-xl sm:text-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-transform"
                  >
                    <IconPlay size={28} />
                    受け取って、お題を見る
                  </button>
                </div>
              )}

            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
